{% load i18n %}

<svg class="mc-pill-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/> <path d="m3.3 7 8.7 5 8.7-5"/> <path d="M12 22V12"/></svg>
<span class="context-overview">
  {% if domain_supported %}
    <span class="context-domain">{{ domain_name }}</span>
    <span class="context-delimiter">&middot;</span>
  {% endif %}
  {% if project_name %}
    <span class="context-project">{{ project_name }}</span>
  {% endif %}
  {% if multi_region %}
    <span class="context-delimiter">&middot;</span>
    <span class="context-region">{{ region_name }}</span>
  {% endif %}
  {% if system_scoped %}
    <span class="context-system">{% trans "system scope" %}</span>
  {% endif %}
</span>
