{% load i18n %}

<svg class="mc-pill-ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/></svg>
<span class="context-overview">
  {% if domain_supported %}
    <span class="context-domain">{{ domain_name }}</span>
    <span class="context-delimiter">&middot;</span>
  {% endif %}
  {% if project_name %}
    <span class="context-project">{{ project_name }}</span>
  {% endif %}
  {% if multi_region %}
    <span class="context-delimiter">&middot;</span>
    <span class="context-region">{{ region_name }}</span>
  {% endif %}
  {% if system_scoped %}
    <span class="context-system">{% trans "system scope" %}</span>
  {% endif %}
</span>
