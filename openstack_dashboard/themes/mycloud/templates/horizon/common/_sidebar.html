{% load branding horizon i18n %}

<nav id="sidebar">
  <style>
    #sidebar .mc-sidebar-brand {
      border-bottom: 0 !important;
    }

    #sidebar .openstack-dashboard > a,
    #sidebar .openstack-panel-group > a {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
    }

    #sidebar .openstack-toggle.fa {
      float: none !important;
      margin-left: auto !important;
      transform: none !important;
    }

    #sidebar .collapsed > .openstack-toggle.fa,
    #sidebar a.collapsed .openstack-toggle.fa {
      transform: none !important;
    }

    /* Panel icons: suppress the (possibly cached) Font Awesome ::before
       glyph so only the injected SVG shows — prevents duplicate icons. */
    #sidebar a.openstack-panel::before { content: none !important; }
    #sidebar a.openstack-panel { display: flex !important; align-items: center; }
    #sidebar a.openstack-panel .mc-nav-ic { margin-right: 9px; flex: 0 0 auto; }

    /* SVG chevron (injected below) replaces the Font Awesome glyph */
    #sidebar .openstack-toggle.fa::before { content: none !important; }
    #sidebar .openstack-toggle .mc-cv {
      width: 14px; height: 14px; opacity: .7;
      color: #94a3b8; transition: transform .15s ease;
    }
    #sidebar a.collapsed .openstack-toggle .mc-cv { transform: rotate(-90deg) !important; }

    #sidebar .openstack-dashboard > .panel-collapse > .list-group,
    #sidebar .openstack-panel-group .list-group {
      border-left: 1px solid rgba(255, 255, 255, .06) !important;
      margin-left: 12px !important;
      padding-left: 4px !important;
      overflow: hidden !important;
    }

    /* Uniform sidebar colour: force every container transparent over the
       single navy base so an open dashboard panel doesn't look lighter
       (guards against a stale compiled bg on .panel/.panel-collapse). */
    #sidebar { background: #0f172a !important; }
    #sidebar .panel,
    #sidebar .panel-default,
    #sidebar .panel-group,
    #sidebar .panel-collapse,
    #sidebar .panel-body,
    #sidebar .list-group,
    #sidebar #sidebar-accordion,
    #sidebar .openstack-dashboard,
    #sidebar .openstack-panel-group,
    #sidebar .well {
      background: transparent !important;
      background-color: transparent !important;
      box-shadow: none !important;
    }

    /* Dashboard headers (Project/Admin/Identity) consistent with group
       headers (Compute/Volumes/Network): same muted colour and NO
       click/hover highlight (they are collapsible section labels, not
       selectable items). */
    #sidebar .openstack-dashboard > a,
    #sidebar .openstack-panel-group > a {
      color: #94a3b8 !important;
    }
    #sidebar .openstack-dashboard > a {
      text-transform: none !important;
      font-size: 13.5px !important;
      font-weight: 600 !important;
      letter-spacing: 0 !important;
    }
    #sidebar .openstack-dashboard.mc-dashboard-static > a {
      cursor: default !important;
      pointer-events: none !important;
    }
    #sidebar .openstack-dashboard.mc-dashboard-static > a .openstack-toggle {
      display: none !important;
    }
    #sidebar .openstack-dashboard.mc-dashboard-static > .panel-collapse {
      display: block !important;
      height: auto !important;
    }
    #sidebar .openstack-dashboard > a:hover,
    #sidebar .openstack-dashboard > a:focus,
    #sidebar .openstack-dashboard > a:active,
    #sidebar .openstack-panel-group > a:hover,
    #sidebar .openstack-panel-group > a:focus,
    #sidebar .openstack-panel-group > a:active {
      background: transparent !important;
      box-shadow: none !important;
      color: #cbd5e1 !important;
    }

    /* Global page header + breadcrumb — match the Overview/mockup style on
       every page. Kept here (served fresh) so it works even when the
       compiled theme CSS is stale. */
    .page-header {
      margin: 0 0 20px !important;
      padding: 0 !important;
      border-bottom: 0 !important;
      min-height: 0 !important;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-header h1 {
      font-size: 22px !important;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
      color: #0f172a;
    }
    .page-breadcrumb { margin: 0; }
    .page-breadcrumb .breadcrumb,
    .breadcrumb {
      background: transparent;
      border-radius: 0;
      margin: 0 0 8px;
      padding: 0;
      font-size: 13.5px;
      line-height: 1.4;
      color: #94a3b8;
    }
    .breadcrumb > li + li::before { content: "/"; color: #cbd5e1; padding: 0 7px; }
    .breadcrumb a { color: #64748b; font-weight: 600; }
    .breadcrumb a:hover { color: #2563eb; }
    .breadcrumb > .active { color: #94a3b8; }

    body.modal-open {
      overflow: hidden !important;
    }
    .modal-dialog-wizard .modal-dialog,
    .modal-dialog.modal-dialog-wizard {
      margin-top: 36px !important;
      margin-bottom: 36px !important;
    }

    /* Stable wizard size: fix the body height so the modal does NOT resize
       as you move between steps (Details is short, Source/Flavor are tall);
       taller steps scroll internally. Pure CSS, one-pass — the wizard /
       transfer-table / magic-search widgets don't read heights in JS, so
       this cannot cause the earlier reflow lag. */
    .ng-wizard .modal-body {
      height: calc(100vh - 19rem);
      overflow-y: auto;
      overflow-x: hidden;
    }
    /* Long lists (Flavor/Source/Key Pair "Available") scroll INSIDE their
       own box, so the Allocated section + heading stay put instead of the
       whole body scrolling. */
    .modal .transfer-available,
    .modal .transfer-allocated {
      max-height: 36vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .ng-wizard .transfer-table .transfer-section {
      margin-top: 12px;
    }
    .ng-wizard .transfer-table .transfer-heading {
      display: block;
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 600;
    }
    .ng-wizard .transfer-table .transfer-heading .fa {
      margin-right: 6px;
    }
    .ng-wizard .transfer-table .transfer-heading .badge {
      vertical-align: 2px;
    }
    .ng-wizard .transfer-table .transfer-heading .help-text {
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 600;
      color: #0f172a;
    }
    .ng-wizard .transfer-table .magic-search-bar,
    .ng-wizard .transfer-table .basic-search-bar {
      margin: 6px 0 8px;
    }
    .ng-wizard .transfer-table .hz-dynamic-table-preamble {
      padding-left: 0;
      padding-right: 0;
    }
    .ng-wizard .transfer-table .hz-magic-search-bar {
      padding-right: 0;
    }
    .ng-wizard .transfer-table .table {
      margin-bottom: 8px;
    }
    /* Keep the transfer search/filter row in the normal table flow.
       Sticky here makes the helper text and search field look detached on
       short lists. */
    .modal .transfer-available .hz-magic-search-context > .row {
      position: static;
      margin-left: 0;
      margin-right: 0;
      padding-bottom: 0;
    }

    /* Wizard "?" help toggle: clean circular ghost button (not the heavy
       default), nudged in from the corner. */
    .ng-wizard .help-toggle {
      top: 4px;
      right: 6px;
      width: 30px;
      height: 30px;
      padding: 0;
      line-height: 1;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      color: #64748b;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .08);
    }
    .ng-wizard .help-toggle:hover,
    .ng-wizard .help-toggle:focus,
    .ng-wizard .help-toggle:active {
      background: #f1f5f9;
      color: #0f172a;
    }

    /* Transfer-table helper text ("Select one"): muted, off the edge. */
    .modal .transfer-heading .help-text {
      margin-top: 6px;
      margin-right: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }

    /* Data-table toolbar (caption): clean right-aligned actions row,
       title hidden (page-header has it), Launch Instance brand-blue with
       the server icon. Kept here so it shows even with stale compiled CSS. */
    table.datatable > caption { caption-side: top; padding: 16px 18px 14px; text-align: left; }
    table.datatable > caption .table-title { display: none; }
    .table_actions {
      display: flex !important;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      float: none;
    }
    .table_actions::before, .table_actions::after { content: none; display: none; }
    .table_actions .table_search,
    .table_actions .table_filter { display: inline-flex; align-items: center; gap: 8px; float: none; margin: 0; }
    .table_actions .table_search .form-group { margin: 0; }
    .table_actions .table_search .form-control { height: 38px; border-radius: 8px; min-width: 200px; box-shadow: none; }
    .table_actions .btn,
    .table_actions .table_actions_menu > .btn { height: 38px; border-radius: 8px; display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
    .table_actions .table_actions_menu { float: none; }
    .btn-launch, a.btn-launch {
      background: #2563eb !important; border-color: #2563eb !important; color: #fff !important;
      box-shadow: 0 1px 2px rgba(15,23,42,.08);
    }
    .btn-launch:hover, a.btn-launch:hover, .btn-launch:focus, a.btn-launch:focus {
      background: #1d4ed8 !important; color: #fff !important;
    }
    .btn-launch .fa::before { content: "\f233" !important; }
    /* Primary Create/Allocate/Import buttons -> brand blue (class added by JS),
       matching the mockup. Delete stays red, Launch keeps its own blue. */
    .mc-create-btn, a.mc-create-btn, button.mc-create-btn {
      background: #2563eb !important; border-color: #2563eb !important; color: #fff !important;
      box-shadow: 0 1px 2px rgba(37,99,235,.25);
    }
    .mc-create-btn:hover, .mc-create-btn:focus, a.mc-create-btn:hover, a.mc-create-btn:focus {
      background: #1d4ed8 !important; border-color: #1d4ed8 !important; color: #fff !important;
    }
    /* Semantic SVG icon injected into Create/toolbar buttons (by JS) */
    .mc-act-ic { width: 15px; height: 15px; flex: 0 0 auto; }
    /* Angular dynamic-table toolbar (magic-search pages e.g. Images): keep the

    #content_body .hz-dynamic-table-preamble { align-items: center; }
    #content_body .hz-dynamic-table-actions { display: inline-flex; align-items: center; gap: 10px; }
    #content_body .hz-dynamic-table-actions .btn { height: 38px; border-radius: 8px; display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }

    /* Data table -> rounded card like the mockup (overflow visible so
       dropdowns are not clipped); roomier cells; no zebra; subtle count. */
    .table_wrapper {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.06);
      margin-bottom: 18px;
    }
    .table_wrapper > form, .table_wrapper > table, .table_wrapper table.datatable { margin-bottom: 0; }
    .table_wrapper table.datatable { border: 0; }
    .table.datatable > thead > tr > th { padding: 11px 18px; }
    .table.datatable > tbody > tr > td { padding: 12px 18px; }
    .table.datatable.table-striped > tbody > tr:nth-of-type(odd) > td { background: transparent; }
    .table.datatable.table-striped > tbody > tr:hover > td { background: #f8fafc; }
    .table.datatable > tbody > tr > td a { font-weight: 600; }
    .table_count { color: #94a3b8; font-size: 13px; font-weight: 500; }
    /* Status / Power State pills (added by JS) */
    .mc-stat-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; line-height: 1.4; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .mc-stat-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: 0 0 auto; }
    .mc-stat-badge.ok    { background: #dcfce7; color: #16a34a; }
    .mc-stat-badge.info  { background: #dbeafe; color: #2563eb; }
    .mc-stat-badge.warn  { background: #fef3c7; color: #d97706; }
    .mc-stat-badge.err   { background: #fee2e2; color: #dc2626; }
    .mc-stat-badge.muted { background: #f1f5f9; color: #64748b; }
    .table.datatable > thead .breadcrumb_td .table_count { display: none; }
  </style>
  <a class="mc-sidebar-brand" href="{% site_branding_link %}" target="_self">
    <span class="mc-brand-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 19A4.5 4.5 0 0 1 5.9 10 6 6 0 0 1 17.6 8.4 4.2 4.2 0 0 1 17 19z"/></svg></span>
    MyCloud
  </a>
  {% horizon_nav %}
</nav>

    user:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',
    users:'<circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 3.2-5 6.5-5s6.5 1.7 6.5 5"/><path d="M16 5.2a3.2 3.2 0 010 6.4M17.5 20c0-2-.8-3.4-2-4.4"/>',

    badge:'<circle cx="12" cy="9" r="5"/><path d="M9 13.5L8 21l4-2 4 2-1-7.5"/>',
    id:'<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="11" r="2"/><path d="M5 16c0-1.7 1.5-2.5 3-2.5s3 .8 3 2.5M14 9h4M14 13h4"/>',
    dot:'<circle cx="12" cy="12" r="3.4"/>'
  };
  var MAP = [
    ['/instances/','server'],['/hypervisors/','server'],['/images/','image'],
    ['/key_pairs/','key'],['/server_groups/','layers'],['/aggregates/','layers'],
    ['/volume_groups/','layers'],['/group_types/','layers'],['/api_access/','code'],
    ['/volumes/','db'],['/volume_types/','db'],['/snapshots/','snap'],['/backups/','snap'],
    ['/vg_snapshots/','snap'],['/network_topology/','share'],['/networks/','net'],
    ['/routers/','router'],['/security_groups/','shield'],['/rbac_policies/','shield'],
    ['/identity_providers/','shield'],['/floating_ips/','globe'],['/domains/','globe'],
    ['/trunks/','link'],['/network_qos/','gauge'],['/floating_ip_portforwardings/','arrows'],
    ['/mappings/','arrows'],['/containers/','box'],['/flavors/','cpu'],['/defaults/','sliders'],
    ['/metadata_defs/','tag'],['/info/','info'],['/projects/','folder'],['/identity/','folder'],
    ['/users/','user'],['/groups/','users'],['/roles/','badge'],
    ['/application_credentials/','key'],['/credentials/','id'],
    ['/overview/','dash'],['/project/','dash'],['/admin/','dash']
  ];
  // 'share' alias -> reuse 'net'-like node graph
  ICN.share = '<circle cx="6" cy="6" r="2.6"/><circle cx="18" cy="6" r="2.6"/><circle cx="12" cy="18" r="2.6"/><path d="M8 7.5l3 8M16 7.5l-3 8"/>';
  function svg(p, cls, size) {
    return '<svg class="' + cls + '" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto">' + p + '</svg>';
  }
  function keyFor(href) {
    for (var i = 0; i < MAP.length; i++) {
      var s = MAP[i][0];
      if (href.slice(-s.length) === s) return MAP[i][1];
    }
    return 'dot';
  }
  function run() {
    var dashboards = document.querySelectorAll('#sidebar .openstack-dashboard');
    for (var d = 0; d < dashboards.length; d++) {
      var label = dashboards[d].querySelector(':scope > a');
      if (!label) continue;
      var title = (label.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
      if (title.indexOf('project') === -1) continue;
      dashboards[d].classList.add('mc-dashboard-static');
      label.removeAttribute('data-toggle');
      label.removeAttribute('data-target');
      label.removeAttribute('href');
      label.setAttribute('aria-expanded', 'true');
      var body = dashboards[d].querySelector(':scope > .panel-collapse');
      if (body) {
        body.classList.add('in');
        body.style.height = 'auto';
      }
    }

    var links = document.querySelectorAll('#sidebar a.openstack-panel');
    for (var i = 0; i < links.length; i++) {
      var a = links[i];
      if (a.querySelector('.mc-nav-ic')) continue;
      var href = a.getAttribute('href') || '';
      a.insertAdjacentHTML('afterbegin', svg(ICN[keyFor(href)] || ICN.dot, 'mc-nav-ic', 17));
    }
    var tg = document.querySelectorAll('#sidebar .openstack-toggle');
    for (var j = 0; j < tg.length; j++) {
      if (tg[j].querySelector('.mc-cv')) continue;
      tg[j].innerHTML = svg('<path d="M6 9l6 6 6-6"/>', 'mc-cv', 14);
    }
  }
  if (document.readyState !== 'loading') run();
  else document.addEventListener('DOMContentLoaded', run);
})();

<script>
// MyCloud: sidebar accordion — only ONE named panel group (Compute/Volumes/
// Network/...) open per dashboard. Opening one collapses the siblings.
// The unnamed "default" group (Overview / API Access) has no toggle, so it
// always stays visible.
(function () {
  function init() {
    var $ = window.jQuery;
    if (!$) return;
    $('#sidebar').on('show.bs.collapse', '.openstack-panel-group > .collapse', function () {
      var $opening = $(this);
      $opening.closest('.openstack-dashboard')
        .find('.openstack-panel-group > .collapse.in')
        .not($opening)
        .collapse('hide');
    });
  }
  if (document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</script>
{% endverbatim %}

<script>
// MyCloud: colour the Status / Power State cells as pills (like the mockup).
// Per-value classes can't be set in CSS, so map the cell text to a colour
// here. Re-runs on Horizon's AJAX row refreshes; idempotent (skips cells
// that already have a badge), so it cannot loop.
(function () {
  function classify(t) {
    t = (t || '').toLowerCase();
    if (/active|running/.test(t)) return 'ok';
    if (/error|crash|fail|deleted/.test(t)) return 'err';
    if (/build|reboot|rebuild|migrat|resiz|spawn|schedul|rescue|password|block device|networking|prepar|powering|image|pending|verify/.test(t)) return 'info';
    if (/paus|suspend|block/.test(t)) return 'warn';
    return 'muted'; // shutoff, stopped, shut down/off, no state, shelved, none
  }
  function badgeTable(table) {
    var headers = table.querySelectorAll('thead tr.table_column_header th');
    var cols = [];
    for (var i = 0; i < headers.length; i++) {
      var ht = (headers[i].textContent || '').trim().toLowerCase();
      if (ht === 'status' || ht === 'power state') cols.push(i);
    }
    if (!cols.length) return;
    var rows = table.querySelectorAll('tbody > tr');
    for (var r = 0; r < rows.length; r++) {
      var cells = rows[r].children;
      for (var c = 0; c < cols.length; c++) {
        var cell = cells[cols[c]];
        if (!cell) continue;
        var dw = cell.querySelector('.table_cell_data_wrapper') || cell;
        if (dw.querySelector('.mc-stat-badge')) continue;
        var txt = (dw.textContent || '').trim();
        if (!txt) continue;
        dw.innerHTML = '<span class="mc-stat-badge ' + classify(txt) + '">' + txt + '</span>';
      }

    flavor:'<rect x="5" y="5" width="14" height="14" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>',

    card:'<rect x="2.5" y="5" width="19" height="14" rx="2"/><path d="M2.5 9.5h19M6 15h5"/>'
  };
  // First regex (on lowercased label) that matches wins. 'group' resolved by path.
  var RULES = [
    [/key pair/, 'key'], [/server group/, 'serverGroup'], [/security group/, 'shield'],
    [/group type/, 'tag'], [/volume type/, 'tag'], [/host aggregate/, 'layers'],
    [/flavor/, 'flavor'], [/rbac/, 'shieldCheck'], [/namespace/, 'fileDown'],
    [/qos/, 'qos'], [/trunk/, 'trunk'], [/router/, 'router'],
    [/rule|forwarding/, 'forward'], [/floating ip|allocate ip|\bip\b/, 'ip'],
    [/domain/, 'globe'], [/project/, 'folder'], [/identity provider/, 'idCard'],
    [/credential/, 'card'], [/mapping/, 'shuffle'], [/role/, 'role'],
    [/image/, 'image'], [/network/, 'network'], [/container/, 'folder'],
    [/volume/, 'volume'], [/\buser\b/, 'user'], [/group/, null]
  ];
  function pick(label) {
    var l = label.toLowerCase();
    for (var i = 0; i < RULES.length; i++) {
      if (RULES[i][0].test(l)) {
        if (RULES[i][1] === null) {
          return /identity|\/groups/.test(location.pathname) ? 'users' : 'group';
        }
        return RULES[i][1];
      }
    }
    return null;
  }
  function svg(key) {
    return '<svg class="mc-act-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">' + IC[key] + '</svg>';
  }
  function decorate(btn) {
    if (btn.querySelector('.mc-act-ic')) return; // already has our icon (self-healing)
    var label = (btn.textContent || '').replace(/\s+/g, ' ').trim();
    if (!/^(create|allocate|import|register|add)\b/i.test(label)) return;
    if (/btn-launch/.test(btn.className)) return;
    var key = pick(label);
    if (!key) return;
    var fa = btn.querySelector('.fa, .glyphicon, i[class*="fa-"]');
    if (fa) fa.outerHTML = svg(key);
    else btn.insertAdjacentHTML('afterbegin', svg(key));
    btn.classList.add('mc-create-btn'); // brand-blue primary, like the mockup
  }
  function run() {
    var btns = document.querySelectorAll(
      '#content_body .table_actions a.btn, #content_body .table_actions button.btn,' +
      '#content_body .hz-dynamic-table-actions a.btn, #content_body .hz-dynamic-table-actions button.btn');
    for (var i = 0; i < btns.length; i++) decorate(btns[i]);
  }
  function init() {
    run();
    if (!window.MutationObserver) return;
    var pending = false;
    var obs = new MutationObserver(function () {
      if (pending) return;
      pending = true;
      setTimeout(function () { pending = false; run(); }, 200);
    });
    var host = document.getElementById('content_body');
    if (host) obs.observe(host, { childList: true, subtree: true });
  }
  if (document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</script>
