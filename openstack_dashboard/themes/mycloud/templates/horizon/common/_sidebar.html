{% load branding horizon i18n %}

<nav id="sidebar">
  <style>
    #sidebar .mc-sidebar-brand {
      border-bottom: 0 !important;
    }

    #sidebar .openstack-dashboard > a,
    #sidebar .openstack-panel-group > a {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
    }

    #sidebar .openstack-toggle.fa {
      float: none !important;
      margin-left: auto !important;
      transform: none !important;
    }

    #sidebar .collapsed > .openstack-toggle.fa,
    #sidebar a.collapsed .openstack-toggle.fa {
      transform: none !important;
    }

    #sidebar a.collapsed .openstack-toggle.fa::before {
      content: '\f054' !important;
    }

    #sidebar .openstack-dashboard > .panel-collapse > .list-group,
    #sidebar .openstack-panel-group .list-group {
      border-left: 1px solid rgba(255, 255, 255, .06) !important;
      margin-left: 12px !important;
      padding-left: 4px !important;
      overflow: hidden !important;
    }
  </style>
  <a class="mc-sidebar-brand" href="{% site_branding_link %}" target="_self">
    <span class="mc-brand-logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 19A4.5 4.5 0 0 1 5.9 10 6 6 0 0 1 17.6 8.4 4.2 4.2 0 0 1 17 19z"/></svg></span>
    MyCloud
  </a>
  {% horizon_nav %}
</nav>
