{% load branding horizon i18n %}

<nav id="sidebar">
  <a class="mc-sidebar-brand" href="{% site_branding_link %}" target="_self">
    <span class="mc-brand-logo">☁</span>
    MyCloud
  </a>
  {% horizon_nav %}
</nav>

<script>
  // Expand all sidebar panel groups on load (matching demo always-open layout)
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('#sidebar .panel-collapse').forEach(function (el) {
      el.classList.add('in');
      el.style.height = 'auto';
    });
  });
</script>
