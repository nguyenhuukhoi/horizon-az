{% if regions.support %}
  <li class="mc-region-pill dropdown">
    {% include "horizon/common/_region_selector.html" %}
  </li>
{% else %}
  <li class="mc-region-pill mc-region-pill-static">
    <span class="mc-pill-static">
      <span class="fa fa-clock-o"></span>
      {{ request.user.services_region|default:"RegionOne" }}

    </span>
  </li>
{% endif %}
